<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Millionaire Where?</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'
          viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%92%B0%3C/text%3E%3C/svg%3E">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            height: 100dvh;
        }
        body {
            display: flex;
            flex-direction: column;
        }

        h1 {
            margin: 0;
            padding: 12px 16px 4px;
            font-size: 1.4rem;
        }
        #tagline {
            margin: 0;
            padding: 0 16px 8px;
            color: #666;
            font-size: 0.9rem;
        }

        /* ── Status banner ── */
        #status {
            display: none;
        }
        #status.loading,
        #status.error {
            display: block;
            padding: 8px 16px;
            text-align: center;
            font-size: 0.9rem;
        }
        #status.loading { background: #fff3cd; color: #856404; }
        #status.error   { background: #f8d7da; color: #721c24; }
        #status.error button {
            margin-left: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* ── Controls bar ── */
        #controls {
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            background: #f8f8f8;
            border-top: 1px solid #e0e0e0;
            border-bottom: 1px solid #e0e0e0;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            gap: 2px;
        }
        .control-group label {
            font-weight: 600;
            font-size: 0.8rem;
        }
        .control-group select,
        .control-group input {
            padding: 6px 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 0.95rem;
            width: 100%;
        }

        /* ── Map fills remaining space ── */
        #map {
            flex: 1;
            min-height: 0;
            height: 100%;
        }

        /* ── Footer ── */
        footer {
            padding: 6px;
            text-align: center;
            font-size: 0.75rem;
            color: #999;
            background: #fafafa;
            border-top: 1px solid #e0e0e0;
        }
        footer a { color: #666; }

        /* ── Mobile ── */
        @media (max-width: 480px) {
            h1 { font-size: 1.2rem; }
            .leaflet-tooltip {
                font-size: 12px;
                max-width: 80vw;
                width: max-content;
                white-space: normal;
            }
        }
    </style>
</head>
<body>

<h1>Millionaire Where?</h1>
<p id="tagline">Select your currency and enter your bank balance to see where you're a millionaire.</p>

<div id="status" class="loading">Loading exchange rates and country data…</div>

<div id="controls">
    <div class="control-group">
        <label for="currency">Currency:</label>
        <select id="currency" disabled></select>
    </div>
    <div class="control-group">
        <label for="balance">Balance:</label>
        <input type="text" id="balance" inputmode="decimal" placeholder="e.g. 50,000" disabled>
    </div>
</div>

<div id="map"></div>

<footer>
    An exercise in LLM agentic tomfoolery.
    <a href="https://github.com/barryprice/millionwhere">Source</a>.
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="app.js" defer></script>

</body>
</html>
